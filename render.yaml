databases:
  - name: mechbazar-db
    plan: free
    databaseName: mechbazar
    user: admin

services:
  - type: web
    name: mechbazar-backend
    env: node
    plan: free
    buildCommand: "cd apps/backend && npm install && npm run build"
    startCommand: "cd apps/backend && npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mechbazar-db
          property: connectionString
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
